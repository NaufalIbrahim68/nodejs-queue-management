<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Manajemen Antrian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #e2e8f0;
            background: #07080f;
            background-image:
                radial-gradient(ellipse 70% 40% at 0% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse 50% 35% at 100% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
        }

        header {
            background: rgba(10, 12, 28, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 40%, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header a {
            color: #64748b;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.15s;
        }

        header a:hover { color: #a5b4fc; }

        #db-banner {
            display: none;
            background: rgba(251, 191, 36, 0.08);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            color: #fcd34d;
            padding: 9px 32px;
            font-size: 0.8rem;
        }

        .stats {
            display: flex;
            gap: 14px;
            padding: 24px 32px 14px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 110px;
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0.4;
        }

        .stat-card.total {
            background: rgba(99, 102, 241, 0.07);
            border-color: rgba(99, 102, 241, 0.2);
        }
        .stat-card.total::before { background: #6366f1; }
        .stat-card.total span { color: #818cf8; }

        .stat-card.waiting {
            background: rgba(251, 191, 36, 0.07);
            border-color: rgba(251, 191, 36, 0.2);
        }
        .stat-card.waiting::before { background: #fbbf24; }
        .stat-card.waiting span { color: #fcd34d; }

        .stat-card.done {
            background: rgba(52, 211, 153, 0.07);
            border-color: rgba(52, 211, 153, 0.2);
        }
        .stat-card.done::before { background: #34d399; }
        .stat-card.done span { color: #6ee7b7; }

        .stat-card p {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .6px;
        }

        .stat-card span { font-size: 2.2rem; font-weight: 900; }

        .table-wrapper {
            padding: 4px 32px 48px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        thead tr {
            background: rgba(99, 102, 241, 0.06);
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
        }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .7px;
            color: rgba(165, 180, 252, 0.6);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.15s;
        }

        tbody tr:hover { background: rgba(99, 102, 241, 0.05); }
        tbody tr.processed { opacity: 0.35; }
        tbody td { padding: 14px 16px; vertical-align: middle; }

        .queue-num {
            font-size: 1.35rem;
            font-weight: 900;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid;
        }

        .badge-waiting {
            background: rgba(251, 191, 36, 0.12);
            color: #fcd34d;
            border-color: rgba(251, 191, 36, 0.25);
        }

        .badge-processed {
            background: rgba(52, 211, 153, 0.12);
            color: #6ee7b7;
            border-color: rgba(52, 211, 153, 0.25);
        }

        .timestamp { font-size: 0.78rem; color: #475569; }

        .btn-process {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        .btn-process:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .btn-process:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

        .empty-row td {
            text-align: center;
            padding: 70px 0;
            color: #334155;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div id="db-banner">
        ⚠️ Mode in-memory aktif — data tidak disimpan permanen (MongoDB tidak terhubung)
    </div>

    <header>
        <h1>🔧 Admin Panel — Manajemen Antrian</h1>
        <a href="/">← Halaman Customer</a>
    </header>

    <div class="stats">
        <div class="stat-card total">  <p>Total</p>    <span id="stat-total">0</span></div>
        <div class="stat-card waiting"><p>Menunggu</p> <span id="stat-waiting">0</span></div>
        <div class="stat-card done">   <p>Diproses</p> <span id="stat-done">0</span></div>
    </div>

    <div class="table-wrapper">
        <table id="queue-table">
            <thead>
                <tr>
                    <th>Queue Number</th>
                    <th>Status</th>
                    <th>Timestamp</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="queue-tbody">
                <tr class="empty-row">
                    <td colspan="4">Belum ada antrian hari ini 🎉</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
</body>
</html>
